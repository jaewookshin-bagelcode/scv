# scv 설정 예시.
# 다단계 병합(뒤가 앞을 덮음): 내장 기본값 → ~/.scv/config.toml(SCV_CONFIG override)
#   → 프로젝트 ./.scv/config.toml(cwd 기준) → 환경변수 SCV_*(중첩은 __, 예 SCV_AGENT__MAX_TOKENS)
#   → CLI 플래그. 누락 파일은 건너뛴다.
# API 키 같은 비밀은 여기 두지 말 것. 환경변수(.env)로만 주입한다.

# 기본으로 사용할 프로바이더 id. [[providers]] 의 id 중 하나여야 한다.
default_provider = "ollama"

# 에이전트 루프 동작
[agent]
max_tokens = 16000        # 응답 1회 상한. 스트리밍 시 64000 까지 권장.
# none(추론 파라미터 미전송 — 비-reasoning 모델용) | low | medium | high | xhigh | max
# OpenAI 비-reasoning 모델(gpt-4o 등)은 reasoning_effort 에 400 을 내므로 그땐 none.
effort = "high"
max_tool_iterations = 50  # 한 턴에서 도구 호출 루프 최대 반복 수(무한루프 방지)

# 세션 저장 위치(상대 경로는 홈 기준). JSONL 트랜스크립트가 쌓인다.
[session]
dir = "~/.scv/sessions"
# 컨텍스트가 이 토큰 수에 근접하면 compaction(요약) 트리거.
compact_threshold_tokens = 150000

# 스킬 탐색 디렉터리(여러 개 가능). 뒤가 앞을 덮어쓴다.
[skills]
dirs = ["~/.scv/skills", "./.scv/skills"]

# 권한 정책: 도구별로 자동 허용/매번 질문/거부를 지정한다.
[permissions]
default = "ask"           # allow | ask | deny
[permissions.tools]
read = "allow"
glob = "allow"
grep = "allow"
edit = "ask"
write = "ask"
bash = "ask"

# UI / 진행 표시(TUI). Ctrl-C: 턴 중단 / idle 더블프레스 종료(docs/ARCHITECTURE.md §4.5).
[ui]
spinner = "auto"          # auto(유니코드 감지) | unicode | ascii(|/-\ 폴백)
# 색 출력은 NO_COLOR 환경변수를 존중한다(별도 설정 없음).

# --- 프로바이더 정의 (멀티 프로바이더) ---
# 기본은 로컬 모델(Ollama, qwen3.5:9b — 무료·오프라인). OpenAI/Anthropic 클라우드 모델은
# --provider openai / --provider anthropic 로 전환해 쓴다.
[[providers]]
id = "openai"
kind = "openai"
model = "gpt-5.5"                  # 클라우드 대체 (GPT-5.5, 현재 공식 최신)
api_key_env = "OPENAI_API_KEY"     # 키를 읽어올 환경변수 이름
base_url = "https://api.openai.com/v1"

[[providers]]
id = "anthropic"
kind = "anthropic"
model = "claude-opus-4-8"          # 직결 (api.anthropic.com)
api_key_env = "ANTHROPIC_API_KEY"
base_url = "https://api.anthropic.com"
anthropic_version = "2023-06-01"
# auth_style 생략 = 기본 x-api-key(직결). aiproxy 경유는 아래 참고.

# aiproxy(사내 게이트웨이) 경유 Anthropic — Sonnet/Haiku.
#   - base_url 끝에 /anthropic 를 붙인다 → {base_url}/v1/messages = .../anthropic/v1/messages
#   - auth_style="bearer" → Authorization: Bearer <token>(게이트웨이가 실제 Anthropic 키 주입,
#     x-api-key 미전송). 토큰 발급: codeb login (Cloudflare VPN + Okta). 자세히는 docs/SETUP.md.
#   - api_key_env 는 프록시 토큰 환경변수 이름(CODEB_TOKEN; AI_PROXY_PERSONAL_TOKEN 도 호환).
[[providers]]
id = "aiproxy"
kind = "anthropic"
model = "claude-sonnet-4-6"        # 또는 claude-haiku-4-5
api_key_env = "CODEB_TOKEN"
base_url = "https://aiproxy-api.backoffice.bagelgames.com/anthropic"
anthropic_version = "2023-06-01"
auth_style = "bearer"
# web_search = true                # 서버사이드 web_search(anthropic 전용). 모델이 서버에서
#                                  # 검색을 실행하고 결과·인용을 응답에 실어 보낸다. 기본 off.

# 기본 프로바이더 — 로컬 모델(Ollama, 무료·오프라인). kind="ollama" 면 OpenAI-호환 어댑터를
# 재사용하되 로컬 기본 base_url(http://localhost:11434/v1)과 호환 모드(max_tokens·no
# stream_options·no reasoning_effort)를 자동 적용한다. (별도 어댑터가 아니라 재사용.)
# qwen3.5:9b 는 tool calling 을 지원해 코딩 에이전트(read/edit/bash 등)에 적합하다.
# api_key_env 를 생략하면 무인증으로 동작한다 → 키·환경변수 없이 out-of-box.
#   ollama serve && ollama pull qwen3.5:9b
[[providers]]
id = "ollama"
kind = "ollama"
model = "qwen3.5:9b"
# api_key_env 생략 = 무인증(Ollama 는 키를 요구하지 않는다).
# base_url = "http://localhost:11434/v1"   # 생략하면 kind="ollama" 가 이 값을 기본 사용

# Gemini (Google AI Studio) — OpenAI-호환 엔드포인트, 무료 티어(Flash 계열).
# kind="openai-compat" 면 와이어 호환 모드(reasoning_effort·stream_options 미전송)로 보낸다.
# function calling·streaming 지원 → 코딩 에이전트에 사용 가능(로컬 모델 대비 지시 준수 양호).
# 무료 모델: gemini-2.5-flash | gemini-3.5-flash | *-flash-lite | gemma-4 (Pro 계열은 유료).
# 키 발급: https://aistudio.google.com → "Get API key"(카드 불필요) 후 export GEMINI_API_KEY=...
[[providers]]
id = "gemini"
kind = "openai-compat"
model = "gemini-2.5-flash"
api_key_env = "GEMINI_API_KEY"
# 끝 슬래시 없이 적는다(끝에 /chat/completions 가 붙음). scv 가 끝 슬래시를 제거해 주지만
# 정규 형태로 둔다.
base_url = "https://generativelanguage.googleapis.com/v1beta/openai"
