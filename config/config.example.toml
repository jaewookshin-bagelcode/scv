# scv 설정 예시.
# 현재는 ~/.config/scv/config.toml 한 곳만 읽는다. 다단계 병합(내장 기본값 → 사용자
#   → 프로젝트 ./.scv/config.toml → 환경변수 SCV_* → CLI)은 계획(docs/ROADMAP.md 4d).
# API 키 같은 비밀은 여기 두지 말 것. 환경변수(.env)로만 주입한다.

# 기본으로 사용할 프로바이더 id. [[providers]] 의 id 중 하나여야 한다.
default_provider = "openai"

# 에이전트 루프 동작
[agent]
max_tokens = 16000        # 응답 1회 상한. 스트리밍 시 64000 까지 권장.
effort = "high"           # low | medium | high | xhigh | max
max_tool_iterations = 50  # 한 턴에서 도구 호출 루프 최대 반복 수(무한루프 방지)

# 세션 저장 위치(상대 경로는 홈 기준). JSONL 트랜스크립트가 쌓인다.
[session]
dir = "~/.scv/sessions"
# 컨텍스트가 이 토큰 수에 근접하면 compaction(요약) 트리거.
compact_threshold_tokens = 150000

# 스킬 탐색 디렉터리(여러 개 가능). 뒤가 앞을 덮어쓴다.
[skills]
dirs = ["~/.config/scv/skills", "./.scv/skills"]

# 권한 정책: 도구별로 자동 허용/매번 질문/거부를 지정한다.
[permissions]
default = "ask"           # allow | ask | deny
[permissions.tools]
read = "allow"
glob = "allow"
grep = "allow"
edit = "ask"
write = "ask"
bash = "ask"

# UI / 진행 표시(TUI). Ctrl-C: 턴 중단 / idle 더블프레스 종료(docs/ARCHITECTURE.md §4.5).
[ui]
spinner = "auto"          # auto(유니코드 감지) | unicode | ascii(|/-\ 폴백)
# 색 출력은 NO_COLOR 환경변수를 존중한다(별도 설정 없음).

# --- 프로바이더 정의 (멀티 프로바이더) ---
# 기본은 OpenAI(ChatGPT 5.5). Anthropic 은 --provider anthropic 로 전환해 쓸 수 있다.
[[providers]]
id = "openai"
kind = "openai"
model = "gpt-5.5"                  # 기본 모델 (ChatGPT 5.5)
api_key_env = "OPENAI_API_KEY"     # 키를 읽어올 환경변수 이름
base_url = "https://api.openai.com/v1"

[[providers]]
id = "anthropic"
kind = "anthropic"
model = "claude-opus-4-8"          # 대체 프로바이더
api_key_env = "ANTHROPIC_API_KEY"
base_url = "https://api.anthropic.com"
anthropic_version = "2023-06-01"
